<script>
        // --- CONSTANTS AND STATE ---
        const PIN = "1979";
        // Free real-time public financial stock API token
        const API_URL = "https://finnhub.io/api/v1/quote?token=clvvkv1r01qio96m6o00clvvkv1r01qio96m6o0g";

        // Load or initialize app settings data setup
        let appData = JSON.parse(localStorage.getItem('daniel_app_data')) || {
            spendingCash: 50.00,
            investingCash: 120.00,
            stocks: [
                { ticker: 'RBLX', shares: 5 },
                { ticker: 'MCD', shares: 2 }
            ],
            history: [
                { date: '2026-06-17', balance: 170.00 } // Clean historical starting baseline set here
            ]
        };

        // Track live tracking value globally to feed the history graph accurately
        let currentCalculatedTotal = 170.00;

        // --- LIVE STOCK DATA & RENDERING ---
        async function fetchStockPrice(ticker) {
            try {
                let response = await fetch(`${API_URL}&symbol=${ticker.toUpperCase()}`);
                let data = await response.json();
                return data.c && data.c !== 0 ? data.c : 50.00; 
            } catch (e) {
                return 50.00;
            }
        }

        async function updateDashboard() {
            // Update Text Figures
            document.getElementById('spending-cash-val').innerText = `$${appData.spendingCash.toFixed(2)}`;
            document.getElementById('investing-cash-val').innerText = `$${appData.investingCash.toFixed(2)}`;

            let tableBody = document.getElementById('stock-table-body');
            tableBody.innerHTML = '';
            
            let accumulatedStockValue = 0;

            for(let item of appData.stocks) {
                if(!item.ticker) continue;
                let price = await fetchStockPrice(item.ticker);
                let totalValue = price * item.shares;
                accumulatedStockValue += totalValue;

                tableBody.innerHTML += `
                    <tr>
                        <td class="stock-ticker">${item.ticker.toUpperCase()}</td>
                        <td>${item.shares}</td>
                        <td>$${price.toFixed(2)}</td>
                        <td>$${totalValue.toFixed(2)}</td>
                    </tr>
                `;
            }

            currentCalculatedTotal = appData.investingCash + accumulatedStockValue;
            document.getElementById('total-investing-val').innerText = `$${currentCalculatedTotal.toFixed(2)}`;
            
            renderChart();
        }

        // --- SECURITY / ADMIN ACCESS ---
        function checkPin() {
            let userPin = prompt("Enter PIN to modify records:");
            if (userPin === PIN) {
                let panel = document.getElementById('admin-panel');
                panel.style.display = panel.style.display === "block" ? "none" : "block";
                
                // Populate inputs with current numbers
                document.getElementById('input-spending-cash').value = appData.spendingCash;
                document.getElementById('input-investing-cash').value = appData.investingCash;
                document.getElementById('input-t1').value = appData.stocks[0]?.ticker || '';
                document.getElementById('input-s1').value = appData.stocks[0]?.shares || 0;
                document.getElementById('input-t2').value = appData.stocks[1]?.ticker || '';
                document.getElementById('input-s2').value = appData.stocks[1]?.shares || 0;
            } else {
                alert("Incorrect PIN access denied.");
            }
        }

        function saveData() {
            appData.spendingCash = parseFloat(document.getElementById('input-spending-cash').value) || 0;
            appData.investingCash = parseFloat(document.getElementById('input-investing-cash').value) || 0;
            
            appData.stocks = [
                { ticker: document.getElementById('input-t1').value.toUpperCase(), shares: parseFloat(document.getElementById('input-s1').value) || 0 },
                { ticker: document.getElementById('input-t2').value.toUpperCase(), shares: parseFloat(document.getElementById('input-s2').value) || 0 }
            ];

            // Wait a split second to pull the exact live calculation total into history
            setTimeout(() => {
                let today = new Date().toLocaleDateString();
                
                // Overwrite last checkpoint if updating multiple times on the same calendar day
                if(appData.history.length > 0 && appData.history[appData.history.length - 1].date === today) {
                    appData.history[appData.history.length - 1].balance = currentCalculatedTotal;
                } else {
                    appData.history.push({ date: today, balance: currentCalculatedTotal });
                }

                localStorage.setItem('daniel_app_data', JSON.stringify(appData));
                updateDashboard();
            }, 300);

            document.getElementById('admin-panel').style.display = "none";
        }

        function clearHistory() {
            if(confirm("Are you sure you want to wipe performance chart metrics history?")) {
                // Returns to clean starting baseline structure
                appData.history = [{ date: new Date().toLocaleDateString(), balance: currentCalculatedTotal }];
                localStorage.setItem('daniel_app_data', JSON.stringify(appData));
                updateDashboard();
            }
        }

        // --- RENDERING GRAPH TRENDS ---
        let trendChart;
        function renderChart() {
            let ctx = document.getElementById('trendChart').getContext('2d');
            let labels = appData.history.map(h => h.date);
            let balances = appData.history.map(h => h.balance);

            if(trendChart) { trendChart.destroy(); }

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Investment Account Balance Over Time ($)',
                        data: balances,
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Initialize dashboard fields on load
        updateDashboard();
    </script>
